name: Deploy Portfolio to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra texlive-latex-recommended

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: v2/package-lock.json

      - name: Install dependencies
        run: cd v2 && npm ci

      - name: Build CV (LaTeX)
        run: |
          cd v2
          mkdir -p public
          pdflatex -interaction=nonstopmode -output-directory=public src/cv/modern_template.tex
          mv public/modern_template.pdf public/resume.pdf

      - name: Build Astro Site
        run: cd v2 && npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: v2/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
